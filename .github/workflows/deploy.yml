name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # --- Backend ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Run Go tests
        run: go test ./...
        working-directory: server

      - name: Build Go binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o bin/qhat-server ./cmd/server
        working-directory: server

      # --- Package ---
      - name: Create deploy package
        run: |
          mkdir -p deploy-pkg/server/bin
          mkdir -p deploy-pkg/frontend
          cp server/bin/qhat-server deploy-pkg/server/bin/
          cp -r frontend/dist deploy-pkg/frontend/
          cp deploy/nginx.conf deploy-pkg/
          cp deploy/systemd/qhat.service deploy-pkg/
          tar -czf deploy-pkg.tar.gz -C deploy-pkg .

      # --- Deploy ---
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST_VAL: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT_VAL: ${{ secrets.REMOTE_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$REMOTE_PORT_VAL" "$REMOTE_HOST_VAL" >> ~/.ssh/known_hosts

      - name: Upload and deploy
        env:
          REMOTE_HOST_VAL: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT_VAL: ${{ secrets.REMOTE_PORT }}
          REMOTE_USER_VAL: ${{ secrets.REMOTE_USER }}
        run: |
          SCP_CMD="scp -i ~/.ssh/deploy_key -P $REMOTE_PORT_VAL"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p $REMOTE_PORT_VAL ${REMOTE_USER_VAL}@${REMOTE_HOST_VAL}"

          $SCP_CMD deploy-pkg.tar.gz "${REMOTE_USER_VAL}@${REMOTE_HOST_VAL}:/tmp/qhat-deploy.tar.gz"

          $SSH_CMD << 'DEPLOY'
          set -e
          DEPLOY_DIR="/opt/qhat"

          sudo systemctl stop qhat || true

          mkdir -p /tmp/qhat-staging
          tar -xzf /tmp/qhat-deploy.tar.gz -C /tmp/qhat-staging

          sudo mkdir -p $DEPLOY_DIR/server/bin $DEPLOY_DIR/frontend
          sudo cp /tmp/qhat-staging/server/bin/qhat-server $DEPLOY_DIR/server/bin/
          sudo rm -rf $DEPLOY_DIR/frontend/dist
          sudo cp -r /tmp/qhat-staging/frontend/dist $DEPLOY_DIR/frontend/

          sudo cp /tmp/qhat-staging/nginx.conf /etc/nginx/sites-available/qhat
          sudo ln -sf /etc/nginx/sites-available/qhat /etc/nginx/sites-enabled/qhat
          sudo nginx -t && sudo systemctl reload nginx

          sudo cp /tmp/qhat-staging/qhat.service /etc/systemd/system/qhat.service
          sudo systemctl daemon-reload
          sudo systemctl start qhat
          sudo systemctl enable qhat

          rm -rf /tmp/qhat-deploy.tar.gz /tmp/qhat-staging

          echo "Deploy complete"
          sleep 2
          sudo systemctl is-active qhat
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
